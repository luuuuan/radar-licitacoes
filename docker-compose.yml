services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: radar
      POSTGRES_PASSWORD: radar
      POSTGRES_DB: radar
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U radar"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: ./backend
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  worker:
    build: ./backend
    env_file: .env
    depends_on:
      - db
      - redis
    command: celery -A app.celery_app.celery worker --loglevel=info

  beat:
    build: ./backend
    env_file: .env
    depends_on:
      - db
      - redis
    command: celery -A app.celery_app.celery beat --loglevel=info

volumes:
  pgdata:
