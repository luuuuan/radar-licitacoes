<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Radar de Licitações — Entrar</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@500;600;700&family=Source+Sans+3:wght@400;500;600;700&display=swap');
  :root{
    --bg:#0f1419; --panel:#1a2129; --panel2:#222b35; --line:#2c3742;
    --txt:#e6edf3; --muted:#8b98a5; --accent:#3b82f6;
    --forte:#22c55e; --medio:#eab308; --fraco:#64748b;
    --destructive:#ef4444; --ring:#3b82f6; --overlay:rgba(0,0,0,.6);
    --font-body:'Source Sans 3',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    --font-heading:'Lexend',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  }
  :root[data-theme="light"]{
    --bg:#f4f6f9; --panel:#ffffff; --panel2:#eef1f5; --line:#d8dee6;
    --txt:#1a2129; --muted:#5b6770; --accent:#2563eb;
    --forte:#16a34a; --medio:#ca8a04; --fraco:#94a3b8;
    --destructive:#dc2626; --ring:#2563eb; --overlay:rgba(15,23,42,.45);
  }
  *{box-sizing:border-box}
  /* troca de tema (claro/escuro) suave em vez de instantânea */
  *{transition:background-color .25s ease,color .25s ease,border-color .25s ease}
  @media (prefers-reduced-motion:reduce){
    /* !important de propósito: é o "desliga tudo" de acessibilidade */
    *{transition:none !important}
  }
  html{overflow-x:hidden}
  input{max-width:100%}
  body{margin:0;max-width:100%;font-family:var(--font-body);
    background:var(--bg);color:var(--txt);font-size:16px;
    min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
  :focus-visible{outline:2px solid var(--ring);outline-offset:2px}
  .box{background:var(--panel);border:1px solid var(--line);border-radius:14px;
    width:100%;max-width:420px;padding:28px}
  .logo{display:flex;align-items:center;gap:10px;margin-bottom:6px}
  .logo svg{color:var(--accent)}
  .logo h1{font-family:var(--font-heading);font-size:18px;margin:0;font-weight:600}
  .sub{color:var(--muted);font-size:12px;margin:0 0 20px}
  .tabs{display:flex;gap:8px;margin-bottom:18px}
  .tabs button{flex:1;padding:9px;border:1px solid var(--line);background:var(--panel2);
    color:var(--muted);border-radius:8px;cursor:pointer;font-size:13px}
  .tabs button.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  label{display:block;font-size:12px;color:var(--muted);margin:12px 0 5px}
  input{width:100%;padding:10px;border:1px solid var(--line);background:var(--panel2);
    color:var(--txt);border-radius:8px;font-size:14px}
  input:focus{border-color:var(--accent)}
  input:focus-visible{outline:2px solid var(--ring);outline-offset:1px}
  .btn{width:100%;margin-top:18px;padding:11px;border:none;border-radius:8px;
    background:var(--accent);color:#fff;font-size:14px;font-weight:600;cursor:pointer}
  .btn:disabled{opacity:.6;cursor:not-allowed}
  .msg{margin-top:14px;padding:10px;border-radius:8px;font-size:13px;display:none}
  .msg.erro{display:block;background:rgba(239,68,68,.12);border:1px solid var(--destructive);color:var(--destructive)}
  .msg.ok{display:block;background:rgba(34,197,94,.12);border:1px solid var(--forte);color:var(--forte)}
  .forca{height:5px;border-radius:3px;background:var(--panel2);margin-top:7px;overflow:hidden}
  .forca i{display:block;height:100%;width:0;transition:width .2s,background .2s}
  .forca-txt{font-size:11px;color:var(--muted);margin-top:4px}
  .hint{font-size:11px;color:var(--muted);margin-top:6px}
  .row{display:flex;gap:10px}
  .row > div{flex:1}
  .hidden{display:none}
  .campo-senha{position:relative}
  .campo-senha input{padding-right:40px}
  .olho{position:absolute;right:6px;top:50%;transform:translateY(-50%);
    background:none;border:none;cursor:pointer;padding:6px;color:var(--muted);
    display:flex;align-items:center;justify-content:center}
  .olho:hover{color:var(--txt)}
  .esqueci{display:block;text-align:right;margin-top:8px;font-size:12px;
    color:var(--accent);text-decoration:none;background:none;border:none;cursor:pointer;
    width:100%}
  .voltar{display:inline-block;margin-top:14px;font-size:12px;color:var(--muted);
    text-decoration:none;background:none;border:none;cursor:pointer;padding:0}
  .voltar:hover{color:var(--txt)}
</style>
<script>
  // aplica o mesmo tema (claro/escuro) escolhido no app principal, antes do
  // primeiro paint, pra login/cadastro não ficarem sempre escuros nem "piscarem"
  try{ document.documentElement.setAttribute('data-theme', localStorage.getItem('radar-tema')||'dark'); }
  catch(e){}
</script>
</head>
<body>
<div class="box">
  <div class="logo">
    <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 12l4-2"/><circle cx="12" cy="12" r="1.5" fill="currentColor"/></svg>
    <h1>Radar de Licitações</h1>
  </div>
  <p class="sub">Monitor de licitações públicas</p>

  <div class="tabs">
    <button id="tab-login" class="on" onclick="mostrar('login')">Entrar</button>
    <button id="tab-cadastro" onclick="mostrar('cadastro')">Criar conta</button>
  </div>

  <!-- LOGIN -->
  <form id="form-login" onsubmit="return entrar(event)">
    <label>E-mail</label>
    <input id="l-email" type="email" autocomplete="email" required>
    <label>Senha</label>
    <div class="campo-senha">
      <input id="l-senha" type="password" autocomplete="current-password" required>
      <button type="button" class="olho" onclick="alternarSenha('l-senha', this)" aria-label="Mostrar senha"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg></button>
    </div>
    <button type="button" class="esqueci" onclick="mostrar('esqueci')">Esqueci minha senha</button>
    <button id="l-submit" class="btn" type="submit">Entrar</button>
  </form>

  <!-- CADASTRO -->
  <form id="form-cadastro" class="hidden" onsubmit="return cadastrar(event)">
    <label>Nome ou razão social</label>
    <input id="c-nome" required>
    <label>CPF ou CNPJ <span style="opacity:.6">(opcional)</span></label>
    <input id="c-doc" placeholder="CPF ou CNPJ" oninput="this.value=mascaraDocLogin(this.value)">
    <label>E-mail</label>
    <input id="c-email" type="email" autocomplete="email" required>
    <label>Senha</label>
    <div class="campo-senha">
      <input id="c-senha" type="password" autocomplete="new-password" required oninput="medirForca()">
      <button type="button" class="olho" onclick="alternarSenha('c-senha', this)" aria-label="Mostrar senha"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg></button>
    </div>
    <div class="forca"><i id="forca-barra"></i></div>
    <div class="forca-txt" id="forca-txt">Use 8+ caracteres, com letra, número e símbolo.</div>
    <button id="c-submit" class="btn" type="submit">Criar conta</button>
  </form>

  <!-- ESQUECI MINHA SENHA -->
  <form id="form-esqueci" class="hidden" onsubmit="return pedirRedefinicao(event)">
    <p class="sub" style="margin:0 0 4px">Informe seu e-mail. Se ele estiver cadastrado, enviaremos um link para redefinir a senha.</p>
    <label>E-mail</label>
    <input id="e-email" type="email" autocomplete="email" required>
    <button id="e-submit" class="btn" type="submit">Enviar link</button>
    <button type="button" class="voltar" onclick="mostrar('login')">&larr; Voltar para o login</button>
  </form>

  <!-- REDEFINIR SENHA -->
  <form id="form-redefinir" class="hidden" onsubmit="return redefinirSenha(event)">
    <label>Nova senha</label>
    <div class="campo-senha">
      <input id="r-senha" type="password" autocomplete="new-password" required oninput="medirForcaRedefinir()">
      <button type="button" class="olho" onclick="alternarSenha('r-senha', this)" aria-label="Mostrar senha"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg></button>
    </div>
    <div class="forca"><i id="forca-barra-r"></i></div>
    <div class="forca-txt" id="forca-txt-r">Use 8+ caracteres, com letra, número e símbolo.</div>
    <label>Confirmar nova senha</label>
    <div class="campo-senha">
      <input id="r-senha2" type="password" autocomplete="new-password" required>
      <button type="button" class="olho" onclick="alternarSenha('r-senha2', this)" aria-label="Mostrar senha"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg></button>
    </div>
    <button id="r-submit" class="btn" type="submit">Redefinir senha</button>
  </form>

  <div id="msg" class="msg"></div>
</div>

<script>
const $ = s => document.querySelector(s);
function mascaraDocLogin(v){
  const d=(v||'').replace(/\D/g,'').slice(0,14);
  if(d.length<=11) return d.replace(/(\d{3})(\d)/,'$1.$2').replace(/(\d{3})(\d)/,'$1.$2').replace(/(\d{3})(\d{1,2})$/,'$1-$2');
  return d.replace(/^(\d{2})(\d)/,'$1.$2').replace(/^(\d{2})\.(\d{3})(\d)/,'$1.$2.$3').replace(/\.(\d{3})(\d)/,'.$1/$2').replace(/(\d{4})(\d{1,2})$/,'$1-$2');
}
function mostrar(qual){
  const formularios = {login:'#form-login', cadastro:'#form-cadastro',
                        esqueci:'#form-esqueci', redefinir:'#form-redefinir'};
  for(const [k, sel] of Object.entries(formularios)){
    $(sel).classList.toggle('hidden', k!==qual);
  }
  const mostrarTabs = qual==='login' || qual==='cadastro';
  $('.tabs').style.display = mostrarTabs ? 'flex' : 'none';
  $('#tab-login').classList.toggle('on', qual==='login');
  $('#tab-cadastro').classList.toggle('on', qual==='cadastro');
  msg('');
}
function msg(t, tipo){
  const m=$('#msg'); m.textContent=t||''; m.className='msg'+(t?(' '+(tipo||'erro')):'');
}
function medirForcaEm(valor, barraEl, txtEl){
  let n=0;
  if(valor.length>=8)n++; if(/[A-Za-z]/.test(valor))n++; if(/\d/.test(valor))n++; if(/[^A-Za-z0-9]/.test(valor))n++;
  const cores=['var(--destructive)','var(--destructive)','var(--medio)','var(--medio)','var(--forte)'];
  const larg=[0,25,50,75,100][n];
  const txt=['','Fraca','Fraca','Média','Forte'][n];
  barraEl.style.width=larg+'%';
  barraEl.style.background=cores[n];
  if(valor) txtEl.textContent = txt+' — 8+ caracteres, com letra, número e símbolo.';
}
function medirForca(){
  medirForcaEm($('#c-senha').value, $('#forca-barra'), $('#forca-txt'));
}
function medirForcaRedefinir(){
  medirForcaEm($('#r-senha').value, $('#forca-barra-r'), $('#forca-txt-r'));
}
const OLHO_ABERTO = '<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg>';
const OLHO_FECHADO = '<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.94 10.94 0 0 1 12 19c-7 0-11-7-11-7a20.3 20.3 0 0 1 4.22-5.06M9.9 4.24A10.94 10.94 0 0 1 12 4c7 0 11 7 11 7a20.3 20.3 0 0 1-2.16 2.94M14.12 14.12a3 3 0 1 1-4.24-4.24"/><path d="M1 1l22 22"/></svg>';
function alternarSenha(id, btn){
  const input = $('#'+id);
  const mostrando = input.type==='text';
  input.type = mostrando ? 'password' : 'text';
  btn.innerHTML = mostrando ? OLHO_ABERTO : OLHO_FECHADO;
  btn.setAttribute('aria-label', mostrando ? 'Mostrar senha' : 'Ocultar senha');
}
async function post(url, body){
  const r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  let j={}; try{ j=await r.json(); }catch(e){}
  return {ok:r.ok, status:r.status, data:j};
}
async function entrar(e){
  e.preventDefault(); msg('');
  const btn=$('#l-submit'); btn.disabled=true;
  const r=await post('/api/auth/login',{email:$('#l-email').value, senha:$('#l-senha').value});
  btn.disabled=false;
  if(r.ok){ location.href='/'; }
  else msg(r.data.detail || 'Não foi possível entrar.');
  return false;
}
async function cadastrar(e){
  e.preventDefault(); msg('');
  const email=($('#c-email').value||'').trim();
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){
    msg('Digite um e-mail válido (ex: nome@dominio.com).', 'erro'); return false;
  }
  const btn=$('#c-submit'); btn.disabled=true;
  const r=await post('/api/auth/cadastro',{
    nome:$('#c-nome').value, email:email,
    senha:$('#c-senha').value, documento:$('#c-doc').value||null});
  btn.disabled=false;
  if(r.ok){
    if(r.data.verificar_email){
      msg(r.data.mensagem || 'Enviamos um link de confirmação para o seu e-mail. Confirme para entrar.', 'ok');
      $('#form-cadastro').reset(); medirForca();
    } else { location.href='/'; }
  } else {
    msg(r.data.detail || 'Não foi possível criar a conta.');
  }
  return false;
}
async function pedirRedefinicao(e){
  e.preventDefault(); msg('');
  const email=($('#e-email').value||'').trim();
  const btn=$('#e-submit'); btn.disabled=true;
  const r=await post('/api/auth/esqueci-senha',{email});
  btn.disabled=false;
  msg(r.data.mensagem || 'Se este e-mail estiver cadastrado, enviamos um link para redefinir a senha.', 'ok');
  $('#form-esqueci').reset();
  return false;
}
async function redefinirSenha(e){
  e.preventDefault(); msg('');
  const senha=$('#r-senha').value, senha2=$('#r-senha2').value;
  if(senha!==senha2){ msg('As senhas não são iguais.', 'erro'); return false; }
  const params = new URLSearchParams(location.search);
  const token = params.get('token');
  if(!token){ msg('Link de redefinição inválido ou expirado.'); return false; }
  const btn=$('#r-submit'); btn.disabled=true;
  const r=await post('/api/auth/redefinir-senha',{token, senha});
  btn.disabled=false;
  if(r.ok){
    msg('Senha redefinida com sucesso! Você já pode entrar.', 'ok');
    $('#form-redefinir').reset();
    setTimeout(()=>{ location.href='/login'; }, 1800);
  } else {
    msg(r.data.detail || 'Não foi possível redefinir a senha.');
  }
  return false;
}

// Página de verificação de e-mail (/verificar?token=...)
(async function(){
  const params = new URLSearchParams(location.search);
  if(location.pathname==='/verificar' && params.get('token')){
    const r=await fetch('/api/auth/verificar?token='+encodeURIComponent(params.get('token')));
    if(r.ok) msg('E-mail confirmado! Agora você já pode entrar.', 'ok');
    else msg('Link de verificação inválido ou já usado.');
  }
  if(location.pathname==='/cadastro') mostrar('cadastro');
  if(location.pathname==='/redefinir-senha'){
    mostrar('redefinir');
    if(!params.get('token')) msg('Link de redefinição inválido ou expirado.');
  }
})();
</script>
</body>
</html>
