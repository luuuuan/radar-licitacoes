name: Coleta diária de licitações

# A coleta roda DENTRO do Render (que alcança o PNCP). Aqui o GitHub só
# "cutuca" o Render 1x/dia via HTTP — o que o IP do GitHub consegue fazer
# (ele só não consegue falar direto com o pncp.gov.br).
#
# Configure no GitHub:
#   - Variable RENDER_URL  (Settings → Secrets and variables → Actions → Variables)
#   - Secret   CRON_SECRET (a mesma chave definida no Render)
on:
  schedule:
    - cron: "0 9 * * *"      # 09:00 UTC = 06:00 no horário de Brasília
  workflow_dispatch: {}

jobs:
  disparar-coleta:
    runs-on: ubuntu-latest
    steps:
      - name: Disparar coleta no Render
        run: |
          URL="${{ vars.RENDER_URL }}"
          if [ -z "$URL" ]; then
            echo "⚠ Defina a variável RENDER_URL (Settings → Secrets and variables → Actions → Variables)"
            exit 1
          fi
          code=$(curl -s -o /tmp/resp.txt -w "%{http_code}" --max-time 120 \
            -X POST "${URL%/}/api/coletar-cron" \
            -H "X-Cron-Key: ${{ secrets.CRON_SECRET }}")
          echo "Resposta do Render: HTTP $code"
          cat /tmp/resp.txt; echo
          # 200 = coleta iniciada. A coleta em si roda em segundo plano no Render.
          if [ "$code" != "200" ]; then
            echo "Falha ao disparar a coleta (verifique RENDER_URL e CRON_SECRET)."
            exit 1
          fi
